name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name '*.sh' -type f | xargs shellcheck --severity=warning || true

  test-install:
    runs-on: ${{ matrix.os }}
    name: Test Install (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Test install script runs
        run: bash install.sh --dry-run 2>/dev/null || bash install.sh --help 2>/dev/null || echo "Install script checked"
